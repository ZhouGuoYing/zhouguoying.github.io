<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>混水摸鱼</title>
  <style>
    :root {
      color-scheme: dark;
      --bg1: #06131f;
      --bg2: #0d2235;
      --panel: rgba(9, 20, 33, 0.78);
      --panel-strong: rgba(11, 28, 44, 0.94);
      --text: #edf8ff;
      --muted: #9ab5c9;
      --gold: #ffd36b;
      --water: #5fc8ff;
      --danger: #ff6d7f;
      --good: #8cf2bf;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(95, 200, 255, 0.16), transparent 28%),
        radial-gradient(circle at 80% 0%, rgba(140, 242, 191, 0.10), transparent 24%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      color: var(--text);
    }

    .shell {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .hud {
      position: absolute;
      inset: 0 0 auto 0;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 16px;
      pointer-events: none;
      z-index: 3;
      flex-wrap: wrap;
    }

    .brand, .stats, .panel {
      background: var(--panel);
      border: 1px solid rgba(150, 190, 220, 0.14);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }

    .brand, .stats {
      border-radius: 18px;
      padding: 14px 16px;
    }

    .brand {
      min-width: 240px;
      max-width: 420px;
    }

    .brand h1 {
      margin: 0 0 8px;
      font-size: clamp(22px, 3vw, 32px);
      letter-spacing: 0.08em;
    }

    .brand p, .panel p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .stats {
      display: grid;
      gap: 8px;
      min-width: 220px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      font-size: 14px;
    }

    .stat-row span:first-child { color: var(--muted); }

    .panel {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(560px, calc(100vw - 32px));
      padding: 28px;
      border-radius: 28px;
      text-align: center;
      z-index: 4;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: clamp(30px, 4vw, 48px);
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 18px 0 20px;
      text-align: left;
    }

    .key {
      border-radius: 16px;
      padding: 12px 14px;
      background: var(--panel-strong);
      border: 1px solid rgba(150, 190, 220, 0.14);
      color: var(--text);
      font-size: 14px;
    }

    .cta {
      border: 0;
      border-radius: 18px;
      padding: 14px 22px;
      background: linear-gradient(135deg, var(--gold), #ffb44c);
      color: #2d1d00;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(255, 211, 107, 0.22);
    }

    .hidden { display: none; }

    .tip {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 720px) {
      .hud { padding: 12px; }
      .brand, .stats { width: 100%; min-width: 0; }
      .controls { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <canvas id="game"></canvas>

    <section class="hud" aria-label="游戏状态">
      <div class="brand">
        <h1>混水摸鱼</h1>
        <p>在浑浊的河水里摸到真鱼，躲开网兜、石头和假鱼。撑得越久，分数越高。</p>
      </div>
      <div class="stats">
        <div class="stat-row"><span>得分</span><strong id="score">0</strong></div>
        <div class="stat-row"><span>最高</span><strong id="best">0</strong></div>
        <div class="stat-row"><span>生命</span><strong id="lives">3</strong></div>
      </div>
    </section>

    <section id="overlay" class="panel">
      <h2 id="title">准备下水</h2>
      <p id="subtitle">用方向键、WASD 或鼠标/触摸移动你的小鱼。碰到真鱼加分，碰到危险会掉生命。</p>
      <div class="controls">
        <div class="key">移动：方向键 / WASD</div>
        <div class="key">瞄准：鼠标 / 触摸</div>
        <div class="key">暂停：P</div>
        <div class="key">重开：R</div>
      </div>
      <button id="startBtn" class="cta">开始摸鱼</button>
      <div class="tip">无需安装，直接双击打开这个 HTML 文件即可玩。</div>
    </section>
  </main>

  <script>
    (() => {
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      const scoreEl = document.getElementById('score');
      const bestEl = document.getElementById('best');
      const livesEl = document.getElementById('lives');
      const overlay = document.getElementById('overlay');
      const titleEl = document.getElementById('title');
      const subtitleEl = document.getElementById('subtitle');
      const startBtn = document.getElementById('startBtn');

      const keys = new Set();
      const pointer = { x: 0, y: 0, active: false };
      const state = {
        running: false,
        paused: false,
        ended: false,
        score: 0,
        best: Number(localStorage.getItem('hunshuiMoyuBest') || 0),
        lives: 3,
        time: 0,
        spawnFish: 0,
        spawnHazard: 0,
        fish: [],
        hazards: [],
        particles: [],
      };

      const player = {
        x: 0,
        y: 0,
        radius: 18,
        vx: 0,
        vy: 0,
      };

      const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
      const rand = (min, max) => min + Math.random() * (max - min);

      function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        const dpr = Math.max(1, window.devicePixelRatio || 1);
        canvas.width = Math.round(rect.width * dpr);
        canvas.height = Math.round(rect.height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        if (!state.running) {
          player.x = rect.width / 2;
          player.y = rect.height * 0.8;
        }
      }

      function syncHud() {
        scoreEl.textContent = String(Math.floor(state.score));
        bestEl.textContent = String(state.best);
        livesEl.textContent = String(state.lives);
      }

      function resetGame() {
        state.running = true;
        state.paused = false;
        state.ended = false;
        state.score = 0;
        state.lives = 3;
        state.time = 0;
        state.spawnFish = 0;
        state.spawnHazard = 0;
        state.fish.length = 0;
        state.hazards.length = 0;
        state.particles.length = 0;
        player.x = canvas.clientWidth / 2;
        player.y = canvas.clientHeight * 0.8;
        player.vx = 0;
        player.vy = 0;
        overlay.classList.add('hidden');
        syncHud();
      }

      function endGame() {
        state.running = false;
        state.ended = true;
        state.best = Math.max(state.best, Math.floor(state.score));
        localStorage.setItem('hunshuiMoyuBest', String(state.best));
        syncHud();
        titleEl.textContent = '翻车了';
        subtitleEl.textContent = `本局得分 ${Math.floor(state.score)}。按 R 或点击按钮重新下水。`;
        startBtn.textContent = '重新开始';
        overlay.classList.remove('hidden');
      }

      function addParticles(x, y, color, count = 10) {
        for (let i = 0; i < count; i += 1) {
          state.particles.push({
            x,
            y,
            vx: rand(-100, 100),
            vy: rand(-100, 100),
            life: rand(0.35, 0.85),
            color,
            size: rand(1.5, 3.2),
          });
        }
      }

      function spawnFish() {
        const radius = rand(10, 16);
        state.fish.push({
          x: rand(radius, canvas.clientWidth - radius),
          y: -30,
          vy: rand(70, 180),
          vx: rand(-45, 45),
          radius,
          value: Math.random() < 0.75 ? 10 : 20,
          wobble: rand(0, Math.PI * 2),
          kind: Math.random() < 0.18 ? 'fake' : 'good',
        });
      }

      function spawnHazard() {
        const typeRoll = Math.random();
        const radius = typeRoll < 0.55 ? rand(16, 26) : rand(20, 36);
        state.hazards.push({
          x: rand(radius, canvas.clientWidth - radius),
          y: -40,
          vy: rand(120, 240) + state.time * 1.2,
          vx: rand(-55, 55),
          radius,
          kind: typeRoll < 0.55 ? 'net' : 'stone',
          spin: rand(-2.8, 2.8),
          angle: rand(0, Math.PI * 2),
        });
      }

      function circleHit(a, b) {
        const dx = a.x - b.x;
        const dy = a.y - b.y;
        return Math.hypot(dx, dy) < a.radius + b.radius;
      }

      function update(dt) {
        if (!state.running || state.paused) return;

        state.time += dt;
        state.spawnFish -= dt;
        state.spawnHazard -= dt;

        if (state.spawnFish <= 0) {
          spawnFish();
          state.spawnFish = rand(0.35, 0.8);
        }

        if (state.spawnHazard <= 0) {
          spawnHazard();
          state.spawnHazard = rand(0.55, 1.1);
        }

        const moveSpeed = 320;
        let inputX = 0;
        let inputY = 0;

        if (keys.has('ArrowLeft') || keys.has('a') || keys.has('A')) inputX -= 1;
        if (keys.has('ArrowRight') || keys.has('d') || keys.has('D')) inputX += 1;
        if (keys.has('ArrowUp') || keys.has('w') || keys.has('W')) inputY -= 1;
        if (keys.has('ArrowDown') || keys.has('s') || keys.has('S')) inputY += 1;

        if (pointer.active) {
          const dx = pointer.x - player.x;
          const dy = pointer.y - player.y;
          const dist = Math.hypot(dx, dy);
          if (dist > 12) {
            inputX += dx / dist;
            inputY += dy / dist;
          }
        }

        const length = Math.hypot(inputX, inputY) || 1;
        player.vx = (inputX / length) * moveSpeed;
        player.vy = (inputY / length) * moveSpeed;
        player.x = clamp(player.x + player.vx * dt, player.radius, canvas.clientWidth - player.radius);
        player.y = clamp(player.y + player.vy * dt, player.radius + 40, canvas.clientHeight - player.radius);

        for (let i = state.fish.length - 1; i >= 0; i -= 1) {
          const fish = state.fish[i];
          fish.y += fish.vy * dt;
          fish.x += Math.sin(state.time * 3 + fish.wobble) * 20 * dt + fish.vx * dt;
          fish.wobble += dt * 5;

          if (circleHit(player, fish)) {
            state.fish.splice(i, 1);
            if (fish.kind === 'good') {
              state.score += fish.value;
              addParticles(fish.x, fish.y, '#8cf2bf', 14);
            } else {
              state.score = Math.max(0, state.score - 8);
              state.lives -= 1;
              addParticles(fish.x, fish.y, '#ff6d7f', 14);
            }
            state.best = Math.max(state.best, Math.floor(state.score));
            syncHud();
          } else if (fish.y > canvas.clientHeight + 40) {
            state.fish.splice(i, 1);
          }
        }

        for (let i = state.hazards.length - 1; i >= 0; i -= 1) {
          const hazard = state.hazards[i];
          hazard.y += hazard.vy * dt;
          hazard.x += hazard.vx * dt;
          hazard.angle += hazard.spin * dt;

          if (hazard.x < hazard.radius || hazard.x > canvas.clientWidth - hazard.radius) {
            hazard.vx *= -1;
            hazard.x = clamp(hazard.x, hazard.radius, canvas.clientWidth - hazard.radius);
          }

          if (circleHit(player, hazard)) {
            state.hazards.splice(i, 1);
            state.lives -= 1;
            state.score = Math.max(0, state.score - 12);
            addParticles(hazard.x, hazard.y, '#ffd36b', 18);
            syncHud();
            if (state.lives <= 0) {
              endGame();
              return;
            }
          } else if (hazard.y > canvas.clientHeight + 60) {
            state.hazards.splice(i, 1);
          }
        }

        for (let i = state.particles.length - 1; i >= 0; i -= 1) {
          const particle = state.particles[i];
          particle.life -= dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.98;
          particle.vy *= 0.98;
          if (particle.life <= 0) state.particles.splice(i, 1);
        }

        state.score += dt * 2;
        if (Math.floor(state.score) !== Number(scoreEl.textContent)) {
          syncHud();
        }
      }

      function drawWater(width, height) {
        const bg = ctx.createLinearGradient(0, 0, 0, height);
        bg.addColorStop(0, '#071522');
        bg.addColorStop(0.55, '#0b2133');
        bg.addColorStop(1, '#05101a');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, width, height);

        ctx.save();
        ctx.globalAlpha = 0.25;
        for (let i = 0; i < 5; i += 1) {
          ctx.strokeStyle = i % 2 === 0 ? 'rgba(95,200,255,0.35)' : 'rgba(140,242,191,0.18)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(0, height * (0.2 + i * 0.16));
          ctx.quadraticCurveTo(width * 0.5, height * (0.15 + i * 0.14), width, height * (0.22 + i * 0.16));
          ctx.stroke();
        }
        ctx.restore();

        ctx.save();
        ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
        for (let i = 0; i < 24; i += 1) {
          const x = (i * 83 + (state.time * 20)) % (width + 100) - 50;
          const y = (i * 41) % height;
          ctx.beginPath();
          ctx.arc(x, y, 1.5 + (i % 3), 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawFish(item) {
        const width = canvas.clientWidth;
        const height = canvas.clientHeight;
        const pulse = 1 + Math.sin(item.wobble) * 0.12;
        const x = item.x;
        const y = item.y;
        const r = item.radius;

        ctx.save();
        ctx.translate(x, y);
        ctx.scale(pulse, pulse);
        if (item.vx < 0) ctx.scale(-1, 1);
        ctx.shadowBlur = 18;
        ctx.shadowColor = item.kind === 'good' ? 'rgba(140,242,191,0.7)' : 'rgba(255,109,127,0.7)';

        if (item.kind === 'good') {
          const grad = ctx.createLinearGradient(-r, -r, r, r);
          grad.addColorStop(0, '#fef2c4');
          grad.addColorStop(0.45, '#ffd36b');
          grad.addColorStop(1, '#ff9f2d');
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.ellipse(0, 0, r * 1.2, r * 0.8, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(-r * 1.15, 0);
          ctx.lineTo(-r * 1.9, -r * 0.7);
          ctx.lineTo(-r * 1.6, 0);
          ctx.lineTo(-r * 1.9, r * 0.7);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = '#fff7df';
          ctx.beginPath();
          ctx.arc(r * 0.35, -r * 0.15, r * 0.12, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.fillStyle = 'rgba(255,109,127,0.98)';
          ctx.beginPath();
          ctx.ellipse(0, 0, r * 1.1, r * 0.75, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#ffe6ea';
          ctx.beginPath();
          ctx.arc(r * 0.3, -r * 0.12, r * 0.11, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = 'rgba(255,255,255,0.6)';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(-r * 0.2, r * 0.1);
          ctx.lineTo(r * 0.45, -r * 0.12);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawHazard(item) {
        const x = item.x;
        const y = item.y;
        const r = item.radius;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(item.angle);
        if (item.kind === 'net') {
          ctx.strokeStyle = 'rgba(255,211,107,0.85)';
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(0, 0, r * 0.95, 0, Math.PI * 2);
          ctx.stroke();
          for (let i = 0; i < 5; i += 1) {
            const angle = (Math.PI * 2 * i) / 5;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(Math.cos(angle) * r * 0.95, Math.sin(angle) * r * 0.95);
            ctx.stroke();
          }
          ctx.fillStyle = 'rgba(255,211,107,0.15)';
          ctx.beginPath();
          ctx.arc(0, 0, r * 0.85, 0, Math.PI * 2);
          ctx.fill();
        } else {
          const grad = ctx.createRadialGradient(-r * 0.2, -r * 0.2, 2, 0, 0, r);
          grad.addColorStop(0, '#d7e6ee');
          grad.addColorStop(1, '#55636f');
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(0, 0, r, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = 'rgba(255,255,255,0.18)';
          ctx.beginPath();
          ctx.arc(-r * 0.2, -r * 0.2, r * 0.35, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawPlayer() {
        const x = player.x;
        const y = player.y;
        const r = player.radius;
        ctx.save();
        ctx.translate(x, y);
        ctx.shadowBlur = 22;
        ctx.shadowColor = 'rgba(95,200,255,0.85)';

        const body = ctx.createRadialGradient(0, 0, 2, 0, 0, r * 1.3);
        body.addColorStop(0, '#ffffff');
        body.addColorStop(0.35, '#8ce8ff');
        body.addColorStop(1, '#34b8ff');
        ctx.fillStyle = body;
        ctx.beginPath();
        ctx.ellipse(0, 0, r * 1.15, r * 0.82, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = 'rgba(7,18,28,0.72)';
        ctx.beginPath();
        ctx.arc(r * 0.28, -r * 0.08, r * 0.12, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = 'rgba(95,200,255,0.35)';
        ctx.beginPath();
        ctx.moveTo(-r * 1.05, 0);
        ctx.lineTo(-r * 1.7, -r * 0.6);
        ctx.lineTo(-r * 1.45, 0);
        ctx.lineTo(-r * 1.7, r * 0.6);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function drawParticles() {
        for (const particle of state.particles) {
          ctx.save();
          ctx.globalAlpha = Math.max(0, particle.life);
          ctx.fillStyle = particle.color;
          ctx.shadowBlur = 10;
          ctx.shadowColor = particle.color;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      function render() {
        const width = canvas.clientWidth;
        const height = canvas.clientHeight;

        drawWater(width, height);
        drawParticles();
        for (const fish of state.fish) drawFish(fish);
        for (const hazard of state.hazards) drawHazard(hazard);
        drawPlayer();

        if (!state.running && !state.ended) {
          ctx.save();
          ctx.fillStyle = 'rgba(255,255,255,0.03)';
          ctx.fillRect(0, 0, width, height);
          ctx.restore();
        }

        requestAnimationFrame(render);
      }

      let last = performance.now();
      function tick(now) {
        const dt = Math.min(0.032, (now - last) / 1000);
        last = now;
        update(dt);
        requestAnimationFrame(tick);
      }

      window.addEventListener('keydown', (event) => {
        const key = event.key;
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' ', 'p', 'P', 'r', 'R'].includes(key)) {
          event.preventDefault();
        }

        if (key === 'p' || key === 'P') {
          if (state.running) {
            state.paused = !state.paused;
            titleEl.textContent = state.paused ? '已暂停' : '准备下水';
            subtitleEl.textContent = state.paused ? '按 P 继续摸鱼。' : '用方向键、WASD 或鼠标/触摸移动你的小鱼。碰到真鱼加分，碰到危险会掉生命。';
            overlay.classList.toggle('hidden', state.running && !state.paused);
          }
          return;
        }

        if (key === 'r' || key === 'R') {
          titleEl.textContent = '准备下水';
          subtitleEl.textContent = '用方向键、WASD 或鼠标/触摸移动你的小鱼。碰到真鱼加分，碰到危险会掉生命。';
          startBtn.textContent = '开始摸鱼';
          resetGame();
          return;
        }

        keys.add(key);
        if (!state.running && (key === ' ' || key === 'Enter')) {
          resetGame();
        }
      });

      window.addEventListener('keyup', (event) => {
        keys.delete(event.key);
      });

      window.addEventListener('pointermove', (event) => {
        const rect = canvas.getBoundingClientRect();
        pointer.x = event.clientX - rect.left;
        pointer.y = event.clientY - rect.top;
        pointer.active = true;
      });

      window.addEventListener('pointerdown', (event) => {
        const rect = canvas.getBoundingClientRect();
        pointer.x = event.clientX - rect.left;
        pointer.y = event.clientY - rect.top;
        pointer.active = true;
        if (!state.running) resetGame();
      });

      window.addEventListener('pointerleave', () => {
        pointer.active = false;
      });

      window.addEventListener('blur', () => keys.clear());

      startBtn.addEventListener('click', () => {
        titleEl.textContent = '准备下水';
        subtitleEl.textContent = '用方向键、WASD 或鼠标/触摸移动你的小鱼。碰到真鱼加分，碰到危险会掉生命。';
        startBtn.textContent = '开始摸鱼';
        resetGame();
      });

      window.addEventListener('resize', resizeCanvas);

      resizeCanvas();
      syncHud();
      render();
      requestAnimationFrame(tick);
    })();
